<!doctype html>
<html lang="en" data-resolution="landscape">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
      }
      body {
        font-family: "Inter", sans-serif;
      }
      code,
      pre,
      .monospace {
        font-family: "JetBrains Mono", monospace;
      }
      .stage {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 120px 160px;
        color: #f8fafc;
        background:
          radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.28), transparent 34%),
          radial-gradient(circle at 78% 70%, rgba(34, 197, 94, 0.22), transparent 30%),
          linear-gradient(135deg, #020617 0%, #111827 100%);
      }
      .card {
        width: 1180px;
        border: 1px solid rgba(148, 163, 184, 0.32);
        border-radius: 28px;
        padding: 72px;
        background: rgba(15, 23, 42, 0.78);
        box-shadow: 0 32px 90px rgba(0, 0, 0, 0.34);
      }
      .eyebrow {
        margin-bottom: 24px;
        color: #86efac;
        font-size: 30px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      h1 {
        max-width: 980px;
        color: #ffffff;
        font-size: 88px;
        line-height: 0.95;
        letter-spacing: -0.02em;
      }
      p {
        max-width: 860px;
        margin-top: 34px;
        color: #cbd5e1;
        font-size: 34px;
        line-height: 1.35;
      }
      .pill-row {
        display: flex;
        gap: 18px;
        margin-top: 48px;
      }
      .pill {
        border: 1px solid rgba(134, 239, 172, 0.42);
        border-radius: 999px;
        padding: 14px 22px;
        color: #dcfce7;
        font-size: 24px;
        font-weight: 700;
        background: rgba(22, 101, 52, 0.24);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="10"
      data-width="1920"
      data-height="1080"
      style="position: relative; width: 1920px; height: 1080px; overflow: hidden"
    >
      <section
        id="smoke"
        class="clip stage"
        data-start="0"
        data-duration="10"
        data-track-index="1"
      >
        <div class="card">
          <div class="eyebrow">HyperFrames smoke test</div>
          <h1>HTML to MP4 is working on this machine.</h1>
          <p>
            Codex can now use the HyperFrames skills, CLI, local Chrome, FFmpeg,
            and deterministic rendering loop for video experiments.
          </p>
          <div class="pill-row">
            <div class="pill">skills installed</div>
            <div class="pill">doctor checked</div>
            <div class="pill">render path ready</div>
          </div>
        </div>
      </section>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.fromTo("#smoke .card", { opacity: 0, y: 36, scale: 0.96 }, { opacity: 1, y: 0, scale: 1, duration: 1.1, ease: "power3.out" }, 0);
      tl.fromTo("#smoke .pill", { opacity: 0, y: 18 }, { opacity: 1, y: 0, stagger: 0.12, duration: 0.55, ease: "power2.out" }, 0.8);
      tl.to("#smoke .card", { opacity: 0, y: -28, scale: 0.98, duration: 0.7, ease: "power2.in" }, 9.2);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
