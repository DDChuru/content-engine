<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Excalidraw Demo - Sets Tutorial</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      width: 100%;
    }

    .excalidraw-wrapper {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      padding: 20px;
      min-height: 800px;
      position: relative;
      overflow: hidden;
    }

    #excalidraw-container {
      width: 100%;
      height: 750px;
      position: relative;
    }

    .controls {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 100;
      display: flex;
      gap: 15px;
    }

    button {
      padding: 15px 30px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5a67d8;
      transform: translateY(-2px);
      box-shadow: 0 15px 30px -5px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #48bb78;
      color: white;
    }

    .btn-secondary:hover {
      background: #38a169;
      transform: translateY(-2px);
    }

    .btn-export {
      background: #ed8936;
      color: white;
    }

    .btn-export:hover {
      background: #dd6b20;
      transform: translateY(-2px);
    }

    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 4px;
      background: linear-gradient(90deg, #667eea, #764ba2);
      width: 0%;
      transition: width 0.3s ease;
      z-index: 101;
    }

    .audio-indicator {
      position: fixed;
      top: 30px;
      right: 30px;
      background: #48bb78;
      color: white;
      padding: 10px 20px;
      border-radius: 25px;
      display: none;
      align-items: center;
      gap: 10px;
      box-shadow: 0 10px 25px -5px rgba(72, 187, 120, 0.4);
      z-index: 100;
    }

    .audio-indicator.playing {
      display: flex;
    }

    .audio-wave {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .audio-wave span {
      width: 3px;
      background: white;
      border-radius: 2px;
      animation: wave 1s ease-in-out infinite;
    }

    .audio-wave span:nth-child(2) {
      animation-delay: 0.1s;
    }

    .audio-wave span:nth-child(3) {
      animation-delay: 0.2s;
    }

    @keyframes wave {
      0%, 100% { height: 8px; }
      50% { height: 16px; }
    }

    .step-info {
      position: fixed;
      top: 30px;
      left: 30px;
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      max-width: 350px;
      z-index: 100;
    }

    .step-info h3 {
      font-size: 18px;
      margin-bottom: 10px;
      color: #1a202c;
    }

    .step-info p {
      font-size: 14px;
      color: #4a5568;
      line-height: 1.6;
    }

    .step-counter {
      display: inline-block;
      background: #667eea;
      color: white;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    canvas {
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="progress-bar" id="progressBar"></div>

  <div class="audio-indicator" id="audioIndicator">
    <div class="audio-wave">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <span>Narrating...</span>
  </div>

  <div class="step-info" id="stepInfo">
    <div class="step-counter">Step 0/7</div>
    <h3 id="stepTitle">Introduction to Sets</h3>
    <p id="stepDescription">Click "Play Demo" to begin the animated lesson</p>
  </div>

  <div class="container">
    <div class="excalidraw-wrapper">
      <div id="excalidraw-container">
        <canvas id="canvas" width="1360" height="750"></canvas>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-secondary" id="resetBtn">Reset</button>
    <button class="btn-export" id="exportBtn">Export PNG</button>
    <button class="btn-primary" id="playBtn">Play Demo</button>
  </div>

  <script>
    // Excalidraw-style element creation (hand-drawn look)
    class ExcalidrawRenderer {
      constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.elements = [];
        this.visibleElements = new Set();
      }

      // Helper to create rough/sketchy lines
      drawRoughLine(x1, y1, x2, y2, color = '#000000', width = 2) {
        this.ctx.strokeStyle = color;
        this.ctx.lineWidth = width;
        this.ctx.lineCap = 'round';
        this.ctx.lineJoin = 'round';

        // Add slight randomness for hand-drawn effect
        const segments = 20;
        this.ctx.beginPath();
        this.ctx.moveTo(x1, y1);

        for (let i = 1; i <= segments; i++) {
          const t = i / segments;
          const x = x1 + (x2 - x1) * t + (Math.random() - 0.5) * 2;
          const y = y1 + (y2 - y1) * t + (Math.random() - 0.5) * 2;
          this.ctx.lineTo(x, y);
        }

        this.ctx.stroke();
      }

      // Draw rough circle (Venn diagram circles)
      drawRoughCircle(x, y, radius, color = '#667eea', fillColor = null, opacity = 0.1) {
        this.ctx.strokeStyle = color;
        this.ctx.lineWidth = 3;

        const segments = 64;
        const roughness = 3;

        this.ctx.beginPath();
        for (let i = 0; i <= segments; i++) {
          const angle = (Math.PI * 2 * i) / segments;
          const r = radius + (Math.random() - 0.5) * roughness;
          const px = x + Math.cos(angle) * r;
          const py = y + Math.sin(angle) * r;

          if (i === 0) {
            this.ctx.moveTo(px, py);
          } else {
            this.ctx.lineTo(px, py);
          }
        }
        this.ctx.closePath();

        if (fillColor) {
          this.ctx.fillStyle = fillColor;
          this.ctx.globalAlpha = opacity;
          this.ctx.fill();
          this.ctx.globalAlpha = 1;
        }

        this.ctx.stroke();
      }

      // Draw rough rectangle
      drawRoughRect(x, y, width, height, color = '#000000', fillColor = null) {
        this.ctx.strokeStyle = color;
        this.ctx.lineWidth = 2;

        // Draw four rough lines
        this.drawRoughLine(x, y, x + width, y, color);
        this.drawRoughLine(x + width, y, x + width, y + height, color);
        this.drawRoughLine(x + width, y + height, x, y + height, color);
        this.drawRoughLine(x, y + height, x, y, color);

        if (fillColor) {
          this.ctx.fillStyle = fillColor;
          this.ctx.globalAlpha = 0.1;
          this.ctx.fillRect(x, y, width, height);
          this.ctx.globalAlpha = 1;
        }
      }

      // Draw text with hand-written feel
      drawText(text, x, y, size = 24, color = '#1a202c', align = 'left', bold = false) {
        this.ctx.fillStyle = color;
        this.ctx.font = `${bold ? 'bold' : 'normal'} ${size}px "Comic Sans MS", cursive`;
        this.ctx.textAlign = align;
        this.ctx.textBaseline = 'middle';
        this.ctx.fillText(text, x, y);
      }

      // Draw arrow
      drawArrow(x1, y1, x2, y2, color = '#667eea') {
        // Draw line
        this.drawRoughLine(x1, y1, x2, y2, color, 2);

        // Draw arrowhead
        const angle = Math.atan2(y2 - y1, x2 - x1);
        const headLength = 15;

        this.ctx.fillStyle = color;
        this.ctx.beginPath();
        this.ctx.moveTo(x2, y2);
        this.ctx.lineTo(
          x2 - headLength * Math.cos(angle - Math.PI / 6),
          y2 - headLength * Math.sin(angle - Math.PI / 6)
        );
        this.ctx.lineTo(
          x2 - headLength * Math.cos(angle + Math.PI / 6),
          y2 - headLength * Math.sin(angle + Math.PI / 6)
        );
        this.ctx.closePath();
        this.ctx.fill();
      }

      clear() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
      }

      // Add element to scene
      addElement(id, drawFunc) {
        this.elements.push({ id, drawFunc });
      }

      // Show element with animation
      showElement(id) {
        this.visibleElements.add(id);
        this.render();
      }

      // Render all visible elements
      render() {
        this.clear();
        this.elements.forEach(el => {
          if (this.visibleElements.has(el.id)) {
            el.drawFunc(this);
          }
        });
      }

      reset() {
        this.visibleElements.clear();
        this.clear();
      }

      // Export as image
      exportPNG() {
        const link = document.createElement('a');
        link.download = 'excalidraw-sets-diagram.png';
        link.href = this.canvas.toDataURL('image/png');
        link.click();
      }
    }

    // Initialize renderer
    const canvas = document.getElementById('canvas');
    const renderer = new ExcalidrawRenderer(canvas);

    // Define all drawing elements (scene setup)
    function setupScene() {
      // Title
      renderer.addElement('title', (r) => {
        r.drawText('Introduction to Sets', 680, 50, 48, '#1a202c', 'center', true);
      });

      // Step 1: Definition box
      renderer.addElement('step1', (r) => {
        r.drawRoughRect(100, 120, 500, 100, '#667eea', 'rgba(102, 126, 234, 0.1)');
        r.drawText('A Set is a collection of', 120, 150, 20, '#1a202c');
        r.drawText('distinct objects or elements', 120, 180, 20, '#1a202c');
      });

      // Step 2: Set notation example
      renderer.addElement('step2', (r) => {
        r.drawText('Set Notation:', 700, 150, 24, '#1a202c', 'left', true);
        r.drawText('A = {1, 2, 3}', 720, 190, 28, '#667eea', 'left', true);
        r.drawRoughRect(715, 170, 160, 40, '#667eea');
      });

      // Step 3: Venn diagram - Set A
      renderer.addElement('step3-vennA', (r) => {
        r.drawRoughCircle(400, 400, 120, '#667eea', 'rgba(102, 126, 234, 0.2)', 0.15);
        r.drawText('A', 350, 350, 32, '#667eea', 'center', true);
        r.drawText('1', 370, 390, 24, '#1a202c');
        r.drawText('2', 380, 420, 24, '#1a202c');
      });

      // Step 4: Venn diagram - Set B
      renderer.addElement('step4-vennB', (r) => {
        r.drawRoughCircle(550, 400, 120, '#48bb78', 'rgba(72, 187, 120, 0.2)', 0.15);
        r.drawText('B', 600, 350, 32, '#48bb78', 'center', true);
        r.drawText('3', 540, 390, 24, '#1a202c');
        r.drawText('4', 550, 420, 24, '#1a202c');
      });

      // Step 5: Intersection label
      renderer.addElement('step5-intersection', (r) => {
        r.drawText('2, 3', 475, 400, 24, '#ed8936', 'center', true);
        r.drawArrow(475, 450, 475, 425, '#ed8936');
        r.drawText('A ∩ B', 475, 470, 20, '#ed8936', 'center', true);
      });

      // Step 6: Union annotation
      renderer.addElement('step6-union', (r) => {
        r.drawText('A ∪ B = {1, 2, 3, 4}', 475, 550, 24, '#1a202c', 'center', true);
        r.drawRoughRect(350, 530, 250, 40, '#667eea');
      });

      // Step 7: Universal set box
      renderer.addElement('step7-universal', (r) => {
        r.drawRoughRect(900, 300, 350, 200, '#9f7aea', 'rgba(159, 122, 234, 0.05)');
        r.drawText('ξ (Universal Set)', 920, 330, 20, '#9f7aea', 'left', true);
        r.drawText('Contains all elements', 920, 360, 16, '#4a5568');
        r.drawText('under consideration', 920, 385, 16, '#4a5568');
        r.drawText('Example: ξ = {1,2,3,4,5,6}', 920, 420, 18, '#1a202c');
        r.drawText('A\' = elements NOT in A', 920, 455, 16, '#718096');
      });
    }

    // Lesson steps with narration
    const lessonSteps = [
      {
        id: 'title',
        elements: ['title'],
        title: 'Introduction to Sets',
        description: 'Welcome to our lesson on Set Theory',
        narration: "Welcome to our lesson on Introduction to Sets, a fundamental concept in mathematics."
      },
      {
        id: 'step1',
        elements: ['title', 'step1'],
        title: 'What is a Set?',
        description: 'A Set is a collection of distinct objects',
        narration: "First, let's understand what a Set is. A Set is simply a collection of distinct objects or elements."
      },
      {
        id: 'step2',
        elements: ['title', 'step1', 'step2'],
        title: 'Set Notation',
        description: 'We use curly braces to denote sets',
        narration: "We write sets using curly braces. For example, Set A containing 1, 2, and 3 is written as shown here."
      },
      {
        id: 'step3',
        elements: ['title', 'step3-vennA'],
        title: 'Visualizing Set A',
        description: 'Visual representation using Venn diagrams',
        narration: "Let's visualize this with a Venn diagram. Here's Set A containing elements 1 and 2."
      },
      {
        id: 'step4',
        elements: ['title', 'step3-vennA', 'step4-vennB'],
        title: 'Two Sets: A and B',
        description: 'Set B contains elements 3 and 4',
        narration: "Now let's add Set B, which contains elements 3 and 4. Notice how some elements may be shared between sets."
      },
      {
        id: 'step5',
        elements: ['title', 'step3-vennA', 'step4-vennB', 'step5-intersection'],
        title: 'Intersection',
        description: 'Common elements between sets',
        narration: "The Intersection, shown by A intersect B, gives us the elements that are common to both sets. In this case, 2 and 3."
      },
      {
        id: 'step6',
        elements: ['title', 'step3-vennA', 'step4-vennB', 'step6-union'],
        title: 'Union',
        description: 'All elements from both sets combined',
        narration: "The Union, A union B, combines all elements from both sets without duplication. This gives us 1, 2, 3, and 4."
      },
      {
        id: 'step7',
        elements: ['title', 'step7-universal'],
        title: 'Universal Set',
        description: 'The set containing all possible elements',
        narration: "Finally, the Universal Set, represented by xi, contains all elements under consideration. The complement of a set contains all elements NOT in that set."
      }
    ];

    let currentStep = -1;
    let isPlaying = false;
    let currentAudio = null;

    // Voice narration
    async function fetchAudio(text, voiceId) {
      try {
        const response = await fetch('http://localhost:3001/api/voice/generate', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            text: text,
            voiceId: voiceId
          })
        });

        if (!response.ok) {
          console.warn('ElevenLabs API failed, using Web Speech API fallback');
          return null;
        }

        const audioBlob = await response.blob();
        const audioUrl = URL.createObjectURL(audioBlob);
        return new Audio(audioUrl);
      } catch (error) {
        console.warn('Audio fetch failed, using fallback:', error);
        return null;
      }
    }

    function speak(text, onEnd) {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 0.9;
      utterance.pitch = 1;

      document.getElementById('audioIndicator').classList.add('playing');

      utterance.onend = () => {
        document.getElementById('audioIndicator').classList.remove('playing');
        if (onEnd) onEnd();
      };

      speechSynthesis.speak(utterance);
    }

    async function playNarration(text, onEnd) {
      const voiceId = 'gYWKdgLtqjPO3D5uDrDP';
      const audio = await fetchAudio(text, voiceId);

      if (audio) {
        document.getElementById('audioIndicator').classList.add('playing');

        audio.onended = () => {
          document.getElementById('audioIndicator').classList.remove('playing');
          if (onEnd) onEnd();
        };

        audio.play();
        currentAudio = audio;
      } else {
        speak(text, onEnd);
      }
    }

    // Update step info display
    function updateStepInfo(step, index) {
      document.querySelector('.step-counter').textContent = `Step ${index + 1}/${lessonSteps.length}`;
      document.getElementById('stepTitle').textContent = step.title;
      document.getElementById('stepDescription').textContent = step.description;
    }

    // Update progress bar
    function updateProgress(percent) {
      document.getElementById('progressBar').style.width = percent + '%';
    }

    // Play next step
    function playNextStep() {
      currentStep++;

      if (currentStep >= lessonSteps.length) {
        isPlaying = false;
        document.getElementById('playBtn').textContent = 'Play Demo';
        updateProgress(100);
        return;
      }

      const step = lessonSteps[currentStep];
      updateStepInfo(step, currentStep);
      updateProgress((currentStep / lessonSteps.length) * 100);

      // Show elements for this step
      step.elements.forEach(elementId => {
        renderer.showElement(elementId);
      });

      // Play narration and move to next step
      playNarration(step.narration, () => {
        setTimeout(() => {
          if (isPlaying) {
            playNextStep();
          }
        }, 800);
      });
    }

    // Control functions
    function play() {
      if (isPlaying) return;

      isPlaying = true;
      currentStep = -1;
      document.getElementById('playBtn').textContent = 'Playing...';

      playNextStep();
    }

    function reset() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
      }
      speechSynthesis.cancel();

      isPlaying = false;
      currentStep = -1;

      renderer.reset();
      updateProgress(0);
      document.getElementById('audioIndicator').classList.remove('playing');
      document.getElementById('playBtn').textContent = 'Play Demo';

      document.querySelector('.step-counter').textContent = 'Step 0/7';
      document.getElementById('stepTitle').textContent = 'Introduction to Sets';
      document.getElementById('stepDescription').textContent = 'Click "Play Demo" to begin the animated lesson';
    }

    function exportImage() {
      renderer.exportPNG();
    }

    // Event listeners
    document.getElementById('playBtn').addEventListener('click', play);
    document.getElementById('resetBtn').addEventListener('click', reset);
    document.getElementById('exportBtn').addEventListener('click', exportImage);

    // Initialize scene
    setupScene();
    reset();
  </script>
</body>
</html>
