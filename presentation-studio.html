<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentation Studio</title>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      height: 100vh;
      display: flex;
      padding: 15px;
      overflow: hidden;
    }

    .container {
      width: 100%;
      height: 100%;
      display: flex;
      gap: 15px;
    }

    /* Main Preview Area */
    .preview-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .preview-wrapper {
      background: #2d3748;
      border-radius: 16px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
      padding: 15px;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 2px solid #4a5568;
    }

    .preview-header h2 {
      font-size: 18px;
      color: #fbbf24;
      margin: 0;
    }

    .preview-nav {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .preview-nav button {
      padding: 8px 16px;
      font-size: 13px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .nav-btn {
      background: #4a5568;
      color: white;
    }
    .nav-btn:hover {
      background: #667eea;
    }

    /* Presentation Selector */
    .presentation-selector {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding: 12px;
      background: #1a202c;
      border-radius: 10px;
    }

    .presentation-selector label {
      font-size: 13px;
      color: #a0aec0;
      white-space: nowrap;
    }

    .presentation-selector select {
      flex: 1;
      padding: 10px 15px;
      border-radius: 8px;
      border: 2px solid #4a5568;
      background: #2d3748;
      color: #e2e8f0;
      font-size: 13px;
      cursor: pointer;
    }

    .presentation-selector select:focus {
      outline: none;
      border-color: #667eea;
    }

    .presentation-selector select option {
      padding: 10px;
    }

    .refresh-btn {
      padding: 10px 15px;
      background: #4a5568;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    .refresh-btn:hover {
      background: #667eea;
    }

    .slide-counter {
      color: #a0aec0;
      font-size: 14px;
      padding: 0 15px;
    }

    #presentation-frame {
      width: 100%;
      flex: 1;
      border: none;
      border-radius: 10px;
      background: #1a1a2e;
    }

    /* Studio Panel */
    .studio-panel {
      width: 380px;
      background: #2d3748;
      border-radius: 16px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      text-align: center;
    }

    .panel-header h1 {
      font-size: 18px;
      color: white;
      margin-bottom: 5px;
    }

    .panel-header p {
      font-size: 12px;
      color: rgba(255,255,255,0.8);
    }

    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    /* Connection Status */
    .connection-status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 15px;
      background: #1a202c;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f56565;
    }
    .status-dot.connected {
      background: #48bb78;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-text {
      font-size: 12px;
      color: #a0aec0;
    }

    /* Change Request Form */
    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .change-type-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 15px;
    }

    .type-btn {
      padding: 10px;
      font-size: 12px;
      border-radius: 8px;
      border: 2px solid #4a5568;
      background: #1a202c;
      color: #a0aec0;
      cursor: pointer;
      transition: all 0.2s;
    }

    .type-btn:hover {
      border-color: #667eea;
      color: white;
    }

    .type-btn.active {
      border-color: #667eea;
      background: #667eea;
      color: white;
    }

    textarea {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 2px solid #4a5568;
      background: #1a202c;
      color: #e2e8f0;
      font-family: inherit;
      font-size: 13px;
      resize: vertical;
      min-height: 100px;
    }

    textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 15px;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Screenshot Button */
    .screenshot-btn {
      width: 100%;
      padding: 12px;
      font-size: 13px;
      border-radius: 8px;
      border: 2px dashed #4a5568;
      background: transparent;
      color: #a0aec0;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 15px;
    }

    .screenshot-btn:hover {
      border-color: #f6ad55;
      color: #f6ad55;
    }

    /* Request History */
    .request-history {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #4a5568;
    }

    .request-item {
      background: #1a202c;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      font-size: 12px;
    }

    .request-item .type {
      color: #667eea;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .request-item .instruction {
      color: #a0aec0;
      line-height: 1.4;
    }

    .request-item .time {
      color: #718096;
      font-size: 11px;
      margin-top: 5px;
    }

    .request-item.pending {
      border-left: 3px solid #f6ad55;
    }

    .request-item.completed {
      border-left: 3px solid #48bb78;
    }

    /* Quick Actions */
    .quick-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #4a5568;
    }

    .quick-btn {
      padding: 10px;
      font-size: 11px;
      border-radius: 6px;
      border: 1px solid #4a5568;
      background: #1a202c;
      color: #a0aec0;
      cursor: pointer;
      transition: all 0.2s;
    }

    .quick-btn:hover {
      background: #4a5568;
      color: white;
    }

    /* Notification */
    .notification {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 15px 25px;
      border-radius: 10px;
      background: #48bb78;
      color: white;
      font-size: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s;
      z-index: 1000;
    }

    .notification.show {
      transform: translateY(0);
      opacity: 1;
    }

    .notification.error {
      background: #f56565;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Main Preview Area -->
    <div class="preview-area">
      <div class="preview-wrapper">
        <!-- Presentation Selector -->
        <div class="presentation-selector">
          <label>📁 Presentation:</label>
          <select id="presentationSelect" onchange="loadPresentation()">
            <optgroup label="🏭 Farmwise">
              <option value="projects/professional/food-safety/output/farmwise-intervention/farmwise-crisis-intervention.html" data-name="Farmwise Crisis Intervention" data-slides="17">Farmwise Crisis Intervention Protocol</option>
            </optgroup>
            <optgroup label="🧪 Chemical Training">
              <option value="projects/professional/food-safety/output/chemicals/chemical-sanitation-training.html" data-name="Chemical Sanitation Excellence" data-slides="45">Chemical Sanitation Excellence (45 slides)</option>
            </optgroup>
            <optgroup label="📚 Other Projects">
              <option value="" data-name="Custom" data-slides="?">-- Enter custom path --</option>
            </optgroup>
          </select>
          <button class="refresh-btn" onclick="refreshPresentation()" title="Reload">🔄</button>
        </div>

        <div class="preview-header">
          <h2 id="presentationTitle">Farmwise Crisis Intervention Protocol</h2>
          <div class="preview-nav">
            <button class="nav-btn" onclick="prevSlide()">← Prev</button>
            <span class="slide-counter">Slide <span id="currentSlide">1</span> / <span id="totalSlides">17</span></span>
            <button class="nav-btn" onclick="nextSlide()">Next →</button>
            <button class="nav-btn" onclick="openFullscreen()" title="Open in new tab">⛶ Fullscreen</button>
          </div>
        </div>
        <iframe
          id="presentation-frame"
          src="projects/professional/food-safety/output/farmwise-intervention/farmwise-crisis-intervention.html"
        ></iframe>
      </div>
    </div>

    <!-- Studio Panel -->
    <div class="studio-panel">
      <div class="panel-header">
        <h1>Presentation Studio</h1>
        <p>Request changes → Claude applies them</p>
      </div>

      <div class="panel-content">
        <!-- Connection Status -->
        <div class="connection-status">
          <div class="status-dot" id="statusDot"></div>
          <span class="status-text" id="statusText">Connecting to backend...</span>
        </div>

        <!-- Change Type -->
        <div class="section-title">What do you want to change?</div>
        <div class="change-type-selector">
          <button class="type-btn active" data-type="content" onclick="selectType(this)">📝 Content</button>
          <button class="type-btn" data-type="styling" onclick="selectType(this)">🎨 Styling</button>
          <button class="type-btn" data-type="layout" onclick="selectType(this)">📐 Layout</button>
          <button class="type-btn" data-type="slide" onclick="selectType(this)">➕ Add/Remove</button>
        </div>

        <!-- Instruction -->
        <div class="section-title">Describe the change:</div>
        <textarea id="instruction" placeholder="E.g., 'Make the Phase 4 text more visible' or 'Add a new slide about emergency contacts'"></textarea>

        <button class="submit-btn" onclick="submitRequest()" id="submitBtn">
          Send Change Request
        </button>

        <button class="screenshot-btn" onclick="captureScreenshot()">
          📸 Capture Current Slide
        </button>

        <!-- Quick Actions -->
        <div class="quick-actions">
          <button class="quick-btn" onclick="quickAction('Fix contrast')">Fix Contrast</button>
          <button class="quick-btn" onclick="quickAction('Increase font size')">Larger Text</button>
          <button class="quick-btn" onclick="quickAction('Add emphasis')">Add Emphasis</button>
          <button class="quick-btn" onclick="quickAction('Simplify content')">Simplify</button>
        </div>

        <!-- Request History -->
        <div class="request-history">
          <div class="section-title">Recent Requests</div>
          <div id="requestHistory">
            <p style="color: #718096; font-size: 12px;">No requests yet</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="notification" id="notification"></div>

  <script>
    let socket = null;
    let currentSlideNum = 1;
    let selectedType = 'content';
    let currentPresentation = 'farmwise-crisis-intervention';
    let currentPresentationPath = '';
    const requestHistory = [];

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      connectSocket();
      setupIframeListener();
    });

    // Connect to backend via WebSocket
    function connectSocket() {
      try {
        socket = io('http://localhost:3001', {
          transports: ['websocket', 'polling']
        });

        socket.on('connect', () => {
          document.getElementById('statusDot').classList.add('connected');
          document.getElementById('statusText').textContent = 'Connected to Claude';
        });

        socket.on('disconnect', () => {
          document.getElementById('statusDot').classList.remove('connected');
          document.getElementById('statusText').textContent = 'Disconnected';
        });

        socket.on('change-applied', (data) => {
          showNotification('Change applied! Refreshing...', 'success');
          setTimeout(() => {
            document.getElementById('presentation-frame').contentWindow.location.reload();
          }, 500);
        });

      } catch (e) {
        console.log('Socket connection not available, using REST API');
        document.getElementById('statusText').textContent = 'Using REST API';
      }
    }

    // Listen for slide changes in iframe
    function setupIframeListener() {
      const iframe = document.getElementById('presentation-frame');
      iframe.onload = () => {
        try {
          const ws = iframe.contentWindow.ws;
          if (ws) {
            ws.el.addEventListener('slide-change', (e) => {
              currentSlideNum = e.detail.currentSlide;
              document.getElementById('currentSlide').textContent = currentSlideNum;
            });
          }
        } catch (e) {
          // Cross-origin issues, that's ok
        }
      };
    }

    // Type selector
    function selectType(btn) {
      document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedType = btn.dataset.type;
    }

    // Submit change request
    async function submitRequest() {
      const instruction = document.getElementById('instruction').value.trim();
      if (!instruction) {
        showNotification('Please describe the change', 'error');
        return;
      }

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';

      const select = document.getElementById('presentationSelect');
      const request = {
        type: selectedType,
        instruction,
        currentSlide: currentSlideNum,
        presentation: currentPresentation,
        presentationPath: select.value || currentPresentationPath,
        timestamp: new Date().toISOString()
      };

      try {
        const response = await fetch('http://localhost:3001/api/studio/change-request', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(request)
        });

        const result = await response.json();

        if (result.success) {
          showNotification('Request sent to Claude!', 'success');
          addToHistory(request);
          document.getElementById('instruction').value = '';
        } else {
          showNotification('Failed to send request', 'error');
        }
      } catch (e) {
        showNotification('Error: ' + e.message, 'error');
      }

      submitBtn.disabled = false;
      submitBtn.textContent = 'Send Change Request';
    }

    // Quick action buttons
    function quickAction(action) {
      document.getElementById('instruction').value = action + ' on the current slide';
    }

    // Capture screenshot
    async function captureScreenshot() {
      const iframe = document.getElementById('presentation-frame');
      try {
        const canvas = await html2canvas(iframe.contentDocument.body, {
          scale: 2,
          useCORS: true,
          logging: false
        });

        canvas.toBlob(async (blob) => {
          const formData = new FormData();
          formData.append('screenshot', blob, `slide-${currentSlideNum}.png`);

          const response = await fetch('http://localhost:3001/api/studio/screenshot/save', {
            method: 'POST',
            body: formData
          });

          if (response.ok) {
            showNotification('Screenshot saved!', 'success');
          }
        });
      } catch (e) {
        showNotification('Screenshot failed: ' + e.message, 'error');
      }
    }

    // Add to history
    function addToHistory(request) {
      requestHistory.unshift(request);
      renderHistory();
    }

    function renderHistory() {
      const container = document.getElementById('requestHistory');
      if (requestHistory.length === 0) {
        container.innerHTML = '<p style="color: #718096; font-size: 12px;">No requests yet</p>';
        return;
      }

      container.innerHTML = requestHistory.slice(0, 5).map(r => `
        <div class="request-item pending">
          <div class="type">${r.type.toUpperCase()} - Slide ${r.currentSlide}</div>
          <div class="instruction">${r.instruction}</div>
          <div class="time">${new Date(r.timestamp).toLocaleTimeString()}</div>
        </div>
      `).join('');
    }

    // Navigation
    function prevSlide() {
      const iframe = document.getElementById('presentation-frame');
      try {
        const ws = iframe.contentWindow.ws;
        if (ws && ws.goLeft) ws.goLeft();
      } catch (e) {
        // Try keyboard event
        iframe.contentWindow.dispatchEvent(new KeyboardEvent('keydown', { key: 'ArrowLeft' }));
      }
    }

    function nextSlide() {
      const iframe = document.getElementById('presentation-frame');
      try {
        const ws = iframe.contentWindow.ws;
        if (ws && ws.goRight) ws.goRight();
      } catch (e) {
        iframe.contentWindow.dispatchEvent(new KeyboardEvent('keydown', { key: 'ArrowRight' }));
      }
    }

    function openFullscreen() {
      const select = document.getElementById('presentationSelect');
      window.open(select.value, '_blank');
    }

    // Presentation Loading
    function loadPresentation() {
      const select = document.getElementById('presentationSelect');
      const option = select.options[select.selectedIndex];
      const path = select.value;

      if (!path) {
        // Custom path option
        const customPath = prompt('Enter the path to your presentation (relative to content-engine folder):');
        if (customPath) {
          loadCustomPresentation(customPath);
        }
        return;
      }

      currentPresentationPath = path;
      currentPresentation = option.dataset.name;
      const totalSlides = option.dataset.slides;

      // Update UI
      document.getElementById('presentationTitle').textContent = option.dataset.name;
      document.getElementById('totalSlides').textContent = totalSlides;
      document.getElementById('currentSlide').textContent = '1';
      currentSlideNum = 1;

      // Load iframe
      document.getElementById('presentation-frame').src = path;
      showNotification(`Loaded: ${option.dataset.name}`, 'success');
    }

    function loadCustomPresentation(path) {
      currentPresentationPath = path;
      currentPresentation = path.split('/').pop().replace('.html', '');

      document.getElementById('presentationTitle').textContent = currentPresentation;
      document.getElementById('totalSlides').textContent = '?';
      document.getElementById('currentSlide').textContent = '1';
      currentSlideNum = 1;

      document.getElementById('presentation-frame').src = path;
      showNotification(`Loaded: ${currentPresentation}`, 'success');
    }

    function refreshPresentation() {
      document.getElementById('presentation-frame').contentWindow.location.reload();
      showNotification('Refreshed!', 'success');
    }

    // Notification
    function showNotification(message, type = 'success') {
      const notif = document.getElementById('notification');
      notif.textContent = message;
      notif.className = 'notification ' + type + ' show';
      setTimeout(() => {
        notif.classList.remove('show');
      }, 3000);
    }
  </script>
</body>
</html>
