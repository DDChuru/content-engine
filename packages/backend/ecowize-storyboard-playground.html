<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ecowize Pitch Storyboard Comparison</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1419;
      --surface: #1a1f26;
      --surface-hover: #242b35;
      --border: #2d3640;
      --text: #e7eaed;
      --text-dim: #8b949e;
      --accent: #26a69a;
      --accent-dim: rgba(38, 166, 154, 0.2);
      --highlight: #f5a623;
      --highlight-dim: rgba(245, 166, 35, 0.2);
      --danger: #ef5350;
      --success: #66bb6a;
      --opus: #26a69a;
      --codex: #42a5f5;
      --gemini: #ab47bc;
      --synthesis: #f5a623;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    .header {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
    }

    .header h1 span {
      color: var(--accent);
    }

    .header-meta {
      font-size: 13px;
      color: var(--text-dim);
    }

    .tabs {
      display: flex;
      gap: 4px;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .tab {
      padding: 10px 20px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tab:hover {
      background: var(--surface-hover);
      color: var(--text);
    }

    .tab.active {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .tab[data-agent="opus"].active { background: rgba(38, 166, 154, 0.2); color: var(--opus); }
    .tab[data-agent="codex"].active { background: rgba(66, 165, 245, 0.2); color: var(--codex); }
    .tab[data-agent="gemini"].active { background: rgba(171, 71, 188, 0.2); color: var(--gemini); }
    .tab[data-agent="synthesis"].active { background: rgba(245, 166, 35, 0.2); color: var(--synthesis); }

    .tab-badge {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 10px;
      background: var(--border);
    }

    .main {
      display: flex;
      height: calc(100vh - 140px);
    }

    .slides-panel {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .detail-panel {
      width: 420px;
      border-left: 1px solid var(--border);
      background: var(--surface);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .timeline-bar {
      padding: 16px 24px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .timeline {
      display: flex;
      gap: 2px;
      height: 24px;
    }

    .timeline-segment {
      flex: 1;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .timeline-segment:hover {
      transform: scaleY(1.2);
    }

    .timeline-segment.selected {
      outline: 2px solid var(--text);
      outline-offset: 2px;
    }

    .timeline-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 10px;
      font-size: 11px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
    }

    .slides-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .slide-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .slide-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .slide-card.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .slide-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .slide-number {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 4px;
      background: var(--accent-dim);
      color: var(--accent);
    }

    .slide-type {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 10px;
      background: var(--border);
      color: var(--text-dim);
    }

    .slide-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .slide-message {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.4;
    }

    .slide-duration {
      margin-top: 12px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .detail-content {
      flex: 1;
      padding: 24px;
    }

    .detail-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .detail-meta {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .meta-tag {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 4px;
      background: var(--border);
    }

    .detail-section {
      margin-bottom: 20px;
    }

    .detail-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .detail-text {
      font-size: 14px;
      line-height: 1.6;
    }

    .detail-narration {
      font-style: italic;
      padding: 12px 16px;
      background: var(--bg);
      border-radius: 6px;
      border-left: 3px solid var(--accent);
    }

    .prompt-section {
      border-top: 1px solid var(--border);
      padding: 20px 24px;
      background: var(--bg);
    }

    .prompt-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .prompt-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
    }

    .copy-btn {
      padding: 6px 12px;
      border: none;
      background: var(--accent);
      color: var(--bg);
      font-size: 12px;
      font-weight: 500;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      background: #2bbd9a;
    }

    .copy-btn.copied {
      background: var(--success);
    }

    .prompt-output {
      font-family: 'SF Mono', Monaco, 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.6;
      color: var(--text-dim);
      white-space: pre-wrap;
      max-height: 150px;
      overflow-y: auto;
    }

    .synthesis-view {
      padding: 24px;
    }

    .synthesis-header {
      margin-bottom: 24px;
    }

    .synthesis-header h2 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .synthesis-header p {
      color: var(--text-dim);
      font-size: 14px;
    }

    .comparison-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 24px;
    }

    .comparison-table th,
    .comparison-table td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .comparison-table th {
      background: var(--surface);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
    }

    .comparison-table td {
      font-size: 14px;
    }

    .agent-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }

    .agent-badge.opus { background: rgba(38, 166, 154, 0.2); color: var(--opus); }
    .agent-badge.codex { background: rgba(66, 165, 245, 0.2); color: var(--codex); }
    .agent-badge.gemini { background: rgba(171, 71, 188, 0.2); color: var(--gemini); }

    .synthesis-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .synthesis-section h3 {
      font-size: 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .synthesis-section h3::before {
      content: '';
      display: block;
      width: 4px;
      height: 20px;
      background: var(--synthesis);
      border-radius: 2px;
    }

    .final-storyboard {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .final-slide {
      display: flex;
      gap: 16px;
      padding: 16px;
      background: var(--bg);
      border-radius: 8px;
      align-items: flex-start;
    }

    .final-slide-num {
      font-size: 14px;
      font-weight: 700;
      color: var(--synthesis);
      min-width: 32px;
    }

    .final-slide-content {
      flex: 1;
    }

    .final-slide-title {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .final-slide-source {
      font-size: 12px;
      color: var(--text-dim);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Ecowize Pitch <span>Storyboard Comparison</span></h1>
    <div class="header-meta">3 AI Perspectives · Executive Presentation</div>
  </div>

  <div class="tabs">
    <button class="tab active" data-agent="opus" onclick="switchTab('opus')">
      <span>Opus</span>
      <span class="tab-badge">14 slides</span>
    </button>
    <button class="tab" data-agent="codex" onclick="switchTab('codex')">
      <span>Codex</span>
      <span class="tab-badge">15 slides</span>
    </button>
    <button class="tab" data-agent="gemini" onclick="switchTab('gemini')">
      <span>Gemini</span>
      <span class="tab-badge">15 slides</span>
    </button>
    <button class="tab" data-agent="synthesis" onclick="switchTab('synthesis')">
      <span>Final Synthesis</span>
    </button>
  </div>

  <div class="main">
    <div class="slides-panel" id="slidesPanel">
      <div class="timeline-bar" id="timelineBar">
        <div class="timeline" id="timeline"></div>
        <div class="timeline-legend">
          <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div> Hook/CTA</div>
          <div class="legend-item"><div class="legend-dot" style="background:#5c6bc0"></div> Credibility</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--danger)"></div> Problem</div>
          <div class="legend-item"><div class="legend-dot" style="background:#ff7043"></div> Impact</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--success)"></div> Solution</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--codex)"></div> Proof</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--gemini)"></div> Partnership</div>
        </div>
      </div>
      <div class="slides-grid" id="slidesGrid"></div>
      <div class="synthesis-view hidden" id="synthesisView"></div>
    </div>

    <div class="detail-panel">
      <div class="detail-content" id="detailContent">
        <p style="color: var(--text-dim); text-align: center; padding-top: 40px;">
          Select a slide to view details
        </p>
      </div>
      <div class="prompt-section">
        <div class="prompt-header">
          <span class="prompt-label">Generated Prompt</span>
          <button class="copy-btn" onclick="copyPrompt()">Copy</button>
        </div>
        <div class="prompt-output" id="promptOutput">Select a storyboard tab to generate a comparison prompt...</div>
      </div>
    </div>
  </div>

  <script>

          { num: 13, title: 'Co-Build and Own', type: 'Partnership', duration: 10, message: 'Your workflows, your IP, your competitive advantage', visual: 'Workshop blueprint with lock icon', narration: 'We design together. The platform and IP remain yours — protecting your competitive edge.' },
          { num: 14, title: 'Why Partner With Us', type: 'Partnership', duration: 10, message: 'Food safety expertise meets agile delivery', visual: 'Three strength badges', narration: 'Deep domain knowledge, scalable architecture, responsive team — without enterprise overhead.' },
          { num: 15, title: 'Next Steps', type: 'CTA', duration: 8, message: 'Short discovery, focused pilot, phased rollout', visual: 'Three-step timeline', narration: 'We propose a short discovery phase. Upon approval, focused pilot then phased rollout.' }
        ]
      }
    };

    const finalSynthesis = [
      { num: 1, title: 'Food Safety Without Blind Spots', source: 'Codex', type: 'Hook' },
      { num: 2, title: 'The Accountability Gap', source: 'Codex/Gemini', type: 'Problem' },
      { num: 3, title: 'If Its Not Recorded, It Did Not Happen', source: 'Codex', type: 'Problem' },
      { num: 4, title: 'One Incident, Enterprise Impact', source: 'All', type: 'Impact' },
      { num: 5, title: 'Audit Drag and Decision Lag', source: 'Codex', type: 'Impact' },
      { num: 6, title: 'The Ecowize Digital Platform', source: 'All', type: 'Solution' },
      { num: 7, title: 'Cleaning Verification', source: 'Opus', type: 'Proof' },
      { num: 8, title: 'NCR Management', source: 'Opus', type: 'Proof' },
      { num: 9, title: 'Internal Audits', source: 'Opus', type: 'Proof' },
      { num: 10, title: 'Executive Command Centre', source: 'All', type: 'Solution' },
      { num: 11, title: 'Trusted by Industry Leaders', source: 'Codex/Gemini', type: 'Proof' },
      { num: 12, title: 'Proven Capability Stack', source: 'Codex', type: 'Proof' },
      { num: 13, title: 'Co-Build and Own', source: 'Codex/Gemini', type: 'Partnership' },
      { num: 14, title: 'The Transformation', source: 'Opus', type: 'Differentiation' },
      { num: 15, title: 'Lets Build This Together', source: 'Opus', type: 'CTA' }
    ];

    let currentTab = 'opus';
    let selectedSlide = null;

    function getTypeColor(type) {
      const colors = {
        'Hook': 'var(--accent)',
        'Credibility': '#5c6bc0',
        'Problem': 'var(--danger)',
        'Impact': '#ff7043',
        'Solution': 'var(--success)',
        'Proof': 'var(--codex)',
        'Differentiation': 'var(--highlight)',
        'Partnership': 'var(--gemini)',
        'CTA': 'var(--accent)'
      };
      return colors[type] || 'var(--border)';
    }

    function init() {
      renderSynthesisView();
      switchTab('opus');
    }

    function switchTab(tab) {
      currentTab = tab;
      selectedSlide = null;

      document.querySelectorAll('.tab').forEach(function(t) {
        t.classList.remove('active');
      });
      document.querySelector('.tab[data-agent="' + tab + '"]').classList.add('active');

      var slidesGrid = document.getElementById('slidesGrid');
      var timelineBar = document.getElementById('timelineBar');
      var synthesisView = document.getElementById('synthesisView');

      if (tab === 'synthesis') {
        slidesGrid.classList.add('hidden');
        timelineBar.classList.add('hidden');
        synthesisView.classList.remove('hidden');
      } else {
        slidesGrid.classList.remove('hidden');
        timelineBar.classList.remove('hidden');
        synthesisView.classList.add('hidden');
        renderSlides(storyboards[tab]);
        renderTimeline(storyboards[tab]);
      }

      updatePrompt();
      clearDetail();
    }

    function renderTimeline(storyboard) {
      var timeline = document.getElementById('timeline');
      var html = '';
      storyboard.slides.forEach(function(slide, i) {
        html += '<div class="timeline-segment" style="background:' + getTypeColor(slide.type) + '" data-index="' + i + '" title="' + slide.title + '" onclick="selectSlide(' + i + ')"></div>';
      });
      timeline.innerHTML = html;
    }

    function renderSlides(storyboard) {
      var grid = document.getElementById('slidesGrid');
      var html = '';
      storyboard.slides.forEach(function(slide, i) {
        html += '<div class="slide-card" data-index="' + i + '" onclick="selectSlide(' + i + ')">' +
          '<div class="slide-header">' +
          '<span class="slide-number">' + slide.num + '</span>' +
          '<span class="slide-type">' + slide.type + '</span>' +
          '</div>' +
          '<div class="slide-title">' + slide.title + '</div>' +
          '<div class="slide-message">' + slide.message + '</div>' +
          '<div class="slide-duration">' + slide.duration + 's</div>' +
          '</div>';
      });
      grid.innerHTML = html;
    }

    function selectSlide(index) {
      selectedSlide = index;

      document.querySelectorAll('.slide-card').forEach(function(c) {
        c.classList.remove('selected');
      });
      document.querySelectorAll('.timeline-segment').forEach(function(s) {
        s.classList.remove('selected');
      });

      var card = document.querySelector('.slide-card[data-index="' + index + '"]');
      var segment = document.querySelector('.timeline-segment[data-index="' + index + '"]');
      if (card) card.classList.add('selected');
      if (segment) segment.classList.add('selected');

      renderDetail(storyboards[currentTab].slides[index]);
      updatePrompt();
    }

    function renderDetail(slide) {
      var detail = document.getElementById('detailContent');
      detail.innerHTML = '<div class="detail-title">' + slide.title + '</div>' +
        '<div class="detail-meta">' +
        '<span class="meta-tag">' + slide.type + '</span>' +
        '<span class="meta-tag">' + slide.duration + 's</span>' +
        '</div>' +
        '<div class="detail-section">' +
        '<div class="detail-label">Key Message</div>' +
        '<div class="detail-text">' + slide.message + '</div>' +
        '</div>' +
        '<div class="detail-section">' +
        '<div class="detail-label">Visual</div>' +
        '<div class="detail-text">' + slide.visual + '</div>' +
        '</div>' +
        '<div class="detail-section">' +
        '<div class="detail-label">Narration</div>' +
        '<div class="detail-narration">"' + slide.narration + '"</div>' +
        '</div>';
    }

    function clearDetail() {
      var detail = document.getElementById('detailContent');
      detail.innerHTML = '<p style="color: var(--text-dim); text-align: center; padding-top: 40px;">Select a slide to view details</p>';
    }

    function renderSynthesisView() {
      var view = document.getElementById('synthesisView');
      var slidesHtml = '';
      finalSynthesis.forEach(function(slide) {
        slidesHtml += '<div class="final-slide">' +
          '<div class="final-slide-num">' + slide.num + '</div>' +
          '<div class="final-slide-content">' +
          '<div class="final-slide-title">' + slide.title + '</div>' +
          '<div class="final-slide-source">Source: ' + slide.source + ' - ' + slide.type + '</div>' +
          '</div></div>';
      });

      view.innerHTML = '<div class="synthesis-header">' +
        '<h2>Opus Final Synthesis</h2>' +
        '<p>Consolidated best storyboard considering all agent inputs</p>' +
        '</div>' +
        '<div class="stats-grid">' +
        '<div class="stat-card"><div class="stat-value">15</div><div class="stat-label">Final Slides</div></div>' +
        '<div class="stat-card"><div class="stat-value">~8m</div><div class="stat-label">Duration</div></div>' +
        '<div class="stat-card"><div class="stat-value">22→15</div><div class="stat-label">Compression</div></div>' +
        '<div class="stat-card"><div class="stat-value">5</div><div class="stat-label">Key Cuts</div></div>' +
        '</div>' +
        '<div class="synthesis-section">' +
        '<h3>Key Decisions</h3>' +
        '<table class="comparison-table"><thead><tr><th>Decision</th><th>Opus</th><th>Codex</th><th>Chosen</th></tr></thead>' +
        '<tbody>' +
        '<tr><td>Hook Approach</td><td>"A Digital Platform..."</td><td>"Food Safety Without Blind Spots"</td><td><span class="agent-badge codex">Codex</span> More impactful</td></tr>' +
        '<tr><td>Pain Point Placement</td><td>Slides 3-5 (early)</td><td>Slides 2-5 (very early)</td><td><span class="agent-badge codex">Codex</span> Problem-first</td></tr>' +
        '<tr><td>Solution Structure</td><td>4 module slides</td><td>4 high-level slides</td><td><span class="agent-badge opus">Opus</span> Shows capability</td></tr>' +
        '<tr><td>Credibility Placement</td><td>Slide 2 (early)</td><td>Slide 10 (after solution)</td><td><span class="agent-badge codex">Codex</span> Proof after solution</td></tr>' +
        '<tr><td>CTA Style</td><td>"Lets Build Together"</td><td>"Decision and Roadmap"</td><td><span class="agent-badge opus">Opus</span> Partnership feel</td></tr>' +
        '</tbody></table></div>' +
        '<div class="synthesis-section">' +
        '<h3>Final Storyboard (15 Slides)</h3>' +
        '<div class="final-storyboard">' + slidesHtml + '</div>' +
        '</div>' +
        '<div class="synthesis-section">' +
        '<h3>What Was Cut</h3>' +
        '<table class="comparison-table"><thead><tr><th>Original Slide</th><th>Action</th><th>Reason</th></tr></thead>' +
        '<tbody>' +
        '<tr><td>Slides 6-8 (Brand/Accountability/Visibility)</td><td>Merged into 1</td><td>Redundant — same theme 3 times</td></tr>' +
        '<tr><td>Slide 4 (Traditional vs Digital)</td><td>Moved to end</td><td>Better as transformation summary</td></tr>' +
        '<tr><td>Slide 15 (Your Reality)</td><td>Cut</td><td>Pain already covered in opening</td></tr>' +
        '<tr><td>Slide 16 (System Requirements)</td><td>Cut</td><td>Implicit in solution shown</td></tr>' +
        '<tr><td>Slide 17-18 (How We Work / Why Us)</td><td>Merged</td><td>Combined into single partnership slide</td></tr>' +
        '</tbody></table></div>';
    }

    function updatePrompt() {
      var output = document.getElementById('promptOutput');

      if (currentTab === 'synthesis') {
        output.textContent = 'Implement this 15-slide storyboard for the Ecowize Pitch:\n\n' +
          'NARRATIVE ARC: Hook → Problem → Impact → Solution (4 modules) → Proof → Partnership → CTA\n\n' +
          'KEY CHANGES FROM ORIGINAL 22 SLIDES:\n' +
          '- Merged slides 6-8 (visibility/accountability) into single statement\n' +
          '- Moved pain points to opening (slides 2-5)\n' +
          '- Kept 4 feature slides (Cleaning, NCR, Audit, Command Centre)\n' +
          '- Combined "How We Work" and "Why Us" into single partnership slide\n' +
          '- Cut redundant "Your Reality" and "System Requirements" slides\n\n' +
          'SLIDE ORDER:\n' +
          '1. Food Safety Without Blind Spots (Hook)\n' +
          '2. The Accountability Gap (Problem)\n' +
          '3. If Its Not Recorded... (Problem)\n' +
          '4. One Incident, Enterprise Impact (Impact)\n' +
          '5. Audit Drag and Decision Lag (Impact)\n' +
          '6. The Ecowize Digital Platform (Solution)\n' +
          '7-9. Module Features (Proof)\n' +
          '10. Command Centre (Solution)\n' +
          '11-12. Credibility and Capabilities (Proof)\n' +
          '13. Co-Build and Own (Partnership)\n' +
          '14. The Transformation (Differentiation)\n' +
          '15. Lets Build This Together (CTA)\n\n' +
          'Total duration: ~8 minutes narrated';
      } else {
        var sb = storyboards[currentTab];
        var types = {};
        sb.slides.forEach(function(s) {
          types[s.type] = (types[s.type] || 0) + 1;
        });

        var typesText = '';
        for (var t in types) {
          typesText += '- ' + t + ': ' + types[t] + ' slides\n';
        }

        var flowText = sb.slides.map(function(s) { return s.type.split(' ')[0]; }).join(' → ');

        var text = sb.name + ' Storyboard Analysis:\n\n' +
          sb.slides.length + ' slides, ' + sb.totalDuration + '\n\n' +
          'Structure:\n' + typesText + '\n' +
          'Flow: ' + flowText;

        if (selectedSlide !== null) {
          var slide = sb.slides[selectedSlide];
          text += '\n\nSelected: Slide ' + slide.num + ' - "' + slide.title + '"\n' +
            'Type: ' + slide.type + '\n' +
            'Message: ' + slide.message;
        }

        output.textContent = text;
      }
    }

    function copyPrompt() {
      var text = document.getElementById('promptOutput').textContent;
      navigator.clipboard.writeText(text).then(function() {
        var btn = document.querySelector('.copy-btn');
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(function() {
          btn.textContent = 'Copy';
          btn.classList.remove('copied');
        }, 1500);
      });
    }

    init();
  </script>
</body>
</html>
