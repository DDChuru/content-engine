<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ecowize Capabilities Preview</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #34d399;
      --accent2: #22d3ee;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px;
    }
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    .header h1 {
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .header p {
      color: var(--muted);
      font-size: 16px;
    }
    .stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin: 24px 0;
    }
    .stat {
      text-align: center;
    }
    .stat-value {
      font-size: 36px;
      font-weight: 700;
      color: var(--accent);
    }
    .stat-label {
      font-size: 14px;
      color: var(--muted);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
      gap: 24px;
      max-width: 1600px;
      margin: 0 auto;
    }
    .card {
      background: var(--surface);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }
    .card.real {
      border: 2px solid var(--accent);
    }
    .card-header {
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--surface2);
    }
    .card-title {
      font-size: 18px;
      font-weight: 600;
    }
    .card-badge {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge-real {
      background: var(--accent);
      color: #0f172a;
    }
    .badge-generated {
      background: var(--accent2);
      color: #0f172a;
    }
    .card-image {
      width: 100%;
      height: auto;
      display: block;
    }
    .card-footer {
      padding: 12px 20px;
      font-size: 13px;
      color: var(--muted);
      background: var(--surface2);
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }
    .lightbox.active {
      display: flex;
    }
    .lightbox img {
      max-width: 100%;
      max-height: 100%;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 40px;
      color: white;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .lightbox-close:hover {
      opacity: 1;
    }
    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 60px;
      color: white;
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.2s;
      user-select: none;
    }
    .lightbox-nav:hover {
      opacity: 1;
    }
    .lightbox-prev { left: 20px; }
    .lightbox-next { right: 20px; }
    .lightbox-title {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 12px 24px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Ecowize Capability Modules</h1>
    <p>Preview all 10 module screenshots for the zoom-out capabilities slide</p>
    <div class="stats">
      <div class="stat">
        <div class="stat-value">3</div>
        <div class="stat-label">Real Screenshots</div>
      </div>
      <div class="stat">
        <div class="stat-value">7</div>
        <div class="stat-label">AI Generated</div>
      </div>
      <div class="stat">
        <div class="stat-value">10</div>
        <div class="stat-label">Total Modules</div>
      </div>
    </div>
  </div>

  <div class="grid" id="grid">
    <!-- Cards generated by JS -->
  </div>

  <div class="lightbox" id="lightbox">
    <span class="lightbox-close" id="lightbox-close">&times;</span>
    <span class="lightbox-nav lightbox-prev" id="lightbox-prev">&#10094;</span>
    <img id="lightbox-img" src="" alt="">
    <span class="lightbox-nav lightbox-next" id="lightbox-next">&#10095;</span>
    <div class="lightbox-title" id="lightbox-title"></div>
  </div>

  <script>
    const modules = [
      { id: 1, name: 'Cleaning Verification', file: 'mod-01-cleaning.png', sub: 'Task Management', real: true },
      { id: 2, name: 'NCR Management', file: 'mod-02-ncr.png', sub: 'Full 7-Status Workflow', real: true },
      { id: 3, name: 'Internal Audits', file: 'mod-03-audit.png', sub: 'Scored Templates', real: true },
      { id: 4, name: 'Proof of Presence', file: 'mod-05-qr.png', sub: 'QR / GPS / NFC', real: false },
      { id: 5, name: 'Online Training', file: 'mod-06-training.png', sub: 'LMS Modules', real: false },
      { id: 6, name: 'Document Control', file: 'mod-07-docs.png', sub: 'Version and Approval', real: false },
      { id: 7, name: 'Asset Registers', file: 'mod-08-assets.png', sub: 'Equipment Tracking', real: false },
      { id: 8, name: 'Glass Registers', file: 'mod-09-glass.png', sub: 'PRP Programs', real: false },
      { id: 9, name: 'Customer Complaints', file: 'mod-10-complaints.png', sub: 'Tracking and Resolution', real: false },
      { id: 10, name: 'Satisfaction Surveys', file: 'mod-11-surveys.png', sub: 'Feedback Loop', real: false },
    ];

    const basePath = '../images/ecowize/showcase/';
    let currentIndex = 0;

    const grid = document.getElementById('grid');

    modules.forEach((mod, i) => {
      const card = document.createElement('div');
      card.className = 'card' + (mod.real ? ' real' : '');

      // Header
      const header = document.createElement('div');
      header.className = 'card-header';

      const title = document.createElement('span');
      title.className = 'card-title';
      title.textContent = mod.id + '. ' + mod.name;

      const badge = document.createElement('span');
      badge.className = 'card-badge ' + (mod.real ? 'badge-real' : 'badge-generated');
      badge.textContent = mod.real ? 'Real' : 'Generated';

      header.appendChild(title);
      header.appendChild(badge);

      // Image
      const img = document.createElement('img');
      img.className = 'card-image';
      img.src = basePath + mod.file;
      img.alt = mod.name;

      // Footer
      const footer = document.createElement('div');
      footer.className = 'card-footer';
      footer.textContent = mod.sub;

      card.appendChild(header);
      card.appendChild(img);
      card.appendChild(footer);

      card.addEventListener('click', function() { openLightbox(i); });
      grid.appendChild(card);
    });

    // Lightbox handlers
    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    document.getElementById('lightbox-prev').addEventListener('click', function() { navLightbox(-1); });
    document.getElementById('lightbox-next').addEventListener('click', function() { navLightbox(1); });

    function openLightbox(index) {
      currentIndex = index;
      updateLightbox();
      document.getElementById('lightbox').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
      document.body.style.overflow = '';
    }

    function navLightbox(dir) {
      currentIndex = (currentIndex + dir + modules.length) % modules.length;
      updateLightbox();
    }

    function updateLightbox() {
      const mod = modules[currentIndex];
      document.getElementById('lightbox-img').src = basePath + mod.file;
      document.getElementById('lightbox-title').textContent = mod.id + '. ' + mod.name + ' - ' + mod.sub;
    }

    document.addEventListener('keydown', function(e) {
      if (!document.getElementById('lightbox').classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') navLightbox(-1);
      if (e.key === 'ArrowRight') navLightbox(1);
    });
  </script>
</body>
</html>
