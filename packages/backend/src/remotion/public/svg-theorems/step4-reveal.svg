<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="goldGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feFlood flood-color="#ffd700" flood-opacity="0.8"/>
      <feComposite in2="coloredBlur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Radial glow for the reveal -->
    <radialGradient id="revealGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ffd700;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGradient)"/>

  <!-- Glow behind the right angle -->
  <circle cx="374" cy="145" r="60" fill="url(#revealGlow)"/>

  <!-- Subtle grid -->
  <g opacity="0.1" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
  </g>

  <!-- Circle -->
  <circle cx="400" cy="280" r="150" fill="none" stroke="#60a5fa" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Diameter -->
  <line x1="250" y1="280" x2="550" y2="280" stroke="#ffffff" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Line AP -->
  <line x1="250" y1="280" x2="374" y2="132" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>

  <!-- Line PB -->
  <line x1="374" y1="132" x2="550" y2="280" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>

  <!-- Right angle symbol - small square at P -->
  <!-- Calculate proper right angle symbol using unit vectors -->
  <g filter="url(#goldGlow)">
    <path
      d="M 374 132
         L 364 144
         L 376 154
         L 386 142
         Z"
      fill="rgba(255, 215, 0, 0.2)"
      stroke="#ffd700"
      stroke-width="2"
    />
  </g>

  <!-- Point A -->
  <circle cx="250" cy="280" r="6" fill="#60a5fa" filter="url(#glow)"/>
  <text x="235" y="310" fill="#94a3b8" font-family="Arial, sans-serif" font-size="18" font-weight="bold">A</text>

  <!-- Point B -->
  <circle cx="550" cy="280" r="6" fill="#60a5fa" filter="url(#glow)"/>
  <text x="555" y="310" fill="#94a3b8" font-family="Arial, sans-serif" font-size="18" font-weight="bold">B</text>

  <!-- Point P -->
  <circle cx="374" cy="132" r="6" fill="#ffd700" filter="url(#goldGlow)"/>
  <text x="355" y="115" fill="#ffd700" font-family="Arial, sans-serif" font-size="18" font-weight="bold">P</text>

  <!-- 90° label - prominent -->
  <text x="395" y="165" fill="#ffd700" font-family="Arial, sans-serif" font-size="20" font-weight="bold" filter="url(#goldGlow)">90°</text>

</svg>
