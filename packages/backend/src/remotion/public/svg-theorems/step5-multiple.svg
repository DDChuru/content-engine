<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="goldGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feFlood flood-color="#ffd700" flood-opacity="0.6"/>
      <feComposite in2="coloredBlur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGradient)"/>

  <!-- Subtle grid -->
  <g opacity="0.1" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
  </g>

  <!-- Circle -->
  <circle cx="400" cy="280" r="150" fill="none" stroke="#60a5fa" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Diameter -->
  <line x1="250" y1="280" x2="550" y2="280" stroke="#ffffff" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Triangle 1: P1 at 60° (left side of arc) -->
  <!-- P1: (400 + 150*cos(140°), 280 - 150*sin(140°)) = (285, 184) -->
  <g opacity="0.5">
    <line x1="250" y1="280" x2="285" y2="184" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="285" y1="184" x2="550" y2="280" stroke="#a78bfa" stroke-width="1.5"/>
    <!-- Right angle symbol -->
    <rect x="280" y="185" width="10" height="10" fill="none" stroke="#a78bfa" stroke-width="1.5" transform="rotate(-25, 285, 190)"/>
  </g>
  <circle cx="285" cy="184" r="5" fill="#a78bfa"/>

  <!-- Triangle 2: P2 at 90° (center top) -->
  <!-- P2: (400 + 150*cos(90°), 280 - 150*sin(90°)) = (400, 130) -->
  <g opacity="0.6">
    <line x1="250" y1="280" x2="400" y2="130" stroke="#34d399" stroke-width="1.5"/>
    <line x1="400" y1="130" x2="550" y2="280" stroke="#34d399" stroke-width="1.5"/>
    <!-- Right angle symbol -->
    <rect x="393" y="138" width="10" height="10" fill="none" stroke="#34d399" stroke-width="1.5"/>
  </g>
  <circle cx="400" cy="130" r="5" fill="#34d399"/>

  <!-- Triangle 3: P3 at 120° (right side of arc) - main focus -->
  <!-- P3: (400 + 150*cos(50°), 280 - 150*sin(50°)) = (496, 165) -->
  <g opacity="0.85">
    <line x1="250" y1="280" x2="496" y2="165" stroke="#ffd700" stroke-width="2" filter="url(#glow)"/>
    <line x1="496" y1="165" x2="550" y2="280" stroke="#ffd700" stroke-width="2" filter="url(#glow)"/>
    <!-- Right angle symbol -->
    <g filter="url(#goldGlow)">
      <path d="M 496 165 L 486 175 L 496 185 L 506 175 Z" fill="none" stroke="#ffd700" stroke-width="2"/>
    </g>
  </g>
  <circle cx="496" cy="165" r="6" fill="#ffd700" filter="url(#goldGlow)"/>

  <!-- Point A -->
  <circle cx="250" cy="280" r="6" fill="#60a5fa" filter="url(#glow)"/>
  <text x="230" y="310" fill="#94a3b8" font-family="Arial, sans-serif" font-size="16" font-weight="bold">A</text>

  <!-- Point B -->
  <circle cx="550" cy="280" r="6" fill="#60a5fa" filter="url(#glow)"/>
  <text x="555" y="310" fill="#94a3b8" font-family="Arial, sans-serif" font-size="16" font-weight="bold">B</text>

  <!-- Labels for each 90° -->
  <text x="265" y="170" fill="#a78bfa" font-family="Arial, sans-serif" font-size="14" font-weight="bold">90°</text>
  <text x="408" y="125" fill="#34d399" font-family="Arial, sans-serif" font-size="14" font-weight="bold">90°</text>
  <text x="508" y="160" fill="#ffd700" font-family="Arial, sans-serif" font-size="16" font-weight="bold" filter="url(#goldGlow)">90°</text>

  <!-- Theorem statement at bottom -->
  <text x="400" y="460" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" opacity="0.8">
    Angle in a Semicircle = 90° (always)
  </text>

</svg>
