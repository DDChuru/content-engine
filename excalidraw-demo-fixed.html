<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Excalidraw Demo - FIXED - Sets Tutorial</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      width: 100%;
      display: flex;
      gap: 20px;
    }

    .main-area {
      flex: 1;
    }

    .excalidraw-wrapper {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      padding: 20px;
      min-height: 800px;
      position: relative;
      overflow: hidden;
    }

    #excalidraw-container {
      width: 100%;
      height: 750px;
      position: relative;
    }

    .editor-panel {
      width: 350px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      padding: 20px;
      max-height: 800px;
      overflow-y: auto;
    }

    .editor-panel h2 {
      font-size: 20px;
      margin-bottom: 15px;
      color: #1a202c;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }

    .step-editor {
      margin: 15px 0;
      padding: 15px;
      background: #f7fafc;
      border-radius: 10px;
      border-left: 4px solid #667eea;
    }

    .step-editor.active {
      background: #e6fffa;
      border-left-color: #48bb78;
    }

    .step-editor h3 {
      font-size: 16px;
      color: #2d3748;
      margin-bottom: 8px;
    }

    .step-editor input, .step-editor textarea {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
      border: 1px solid #cbd5e0;
      border-radius: 5px;
      font-size: 14px;
      font-family: inherit;
    }

    .step-editor textarea {
      min-height: 60px;
      resize: vertical;
    }

    .step-editor button {
      padding: 6px 12px;
      font-size: 12px;
      margin-top: 5px;
    }

    .controls {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 100;
      display: flex;
      gap: 15px;
    }

    button {
      padding: 15px 30px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5a67d8;
      transform: translateY(-2px);
      box-shadow: 0 15px 30px -5px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #48bb78;
      color: white;
    }

    .btn-secondary:hover {
      background: #38a169;
      transform: translateY(-2px);
    }

    .btn-export {
      background: #ed8936;
      color: white;
    }

    .btn-export:hover {
      background: #dd6b20;
      transform: translateY(-2px);
    }

    .btn-edit {
      background: #9f7aea;
      color: white;
    }

    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 4px;
      background: linear-gradient(90deg, #667eea, #764ba2);
      width: 0%;
      transition: width 0.3s ease;
      z-index: 101;
    }

    .audio-indicator {
      position: fixed;
      top: 30px;
      right: 30px;
      background: #48bb78;
      color: white;
      padding: 10px 20px;
      border-radius: 25px;
      display: none;
      align-items: center;
      gap: 10px;
      box-shadow: 0 10px 25px -5px rgba(72, 187, 120, 0.4);
      z-index: 100;
    }

    .audio-indicator.playing {
      display: flex;
    }

    .audio-wave {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .audio-wave span {
      width: 3px;
      background: white;
      border-radius: 2px;
      animation: wave 1s ease-in-out infinite;
    }

    .audio-wave span:nth-child(2) {
      animation-delay: 0.1s;
    }

    .audio-wave span:nth-child(3) {
      animation-delay: 0.2s;
    }

    @keyframes wave {
      0%, 100% { height: 8px; }
      50% { height: 16px; }

    .step-info {
      position: fixed;
      top: 30px;
      left: 30px;
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      max-width: 350px;
      z-index: 100;
    }

    .step-info.editing-mode {
      display: none;
    }

    .step-info h3 {
      font-size: 18px;
      margin-bottom: 10px;
      color: #1a202c;
    }

    .step-info p {
      font-size: 14px;
      color: #4a5568;
      line-height: 1.6;
    }

    .step-counter {
      display: inline-block;
      background: #667eea;
      color: white;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    canvas {
      border-radius: 10px;
    }

    .error-badge {
      background: #fc8181;
      color: white;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      margin-left: 8px;
    }

    .success-badge {
      background: #48bb78;
      color: white;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <div class="progress-bar" id="progressBar"></div>

  <div class="audio-indicator" id="audioIndicator">
    <div class="audio-wave">
      <span></span>

      <span></span>

  <div class="step-info" id="stepInfo">
    <div class="step-counter">Step 0/8</div>

  <div class="container">
    <div class="main-area">
      <div class="excalidraw-wrapper">
        <div id="excalidraw-container">
          <canvas id="canvas" width="1360" height="750"></canvas>
        </div>
      </div>
    </div>

    <div class="editor-panel" id="editorPanel" style="display: none;">
      <h2>Studio Editor <span class="success-badge">CORRECTED</span></h2>
      <p style="font-size: 13px; color: #718096; margin-bottom: 15px;">
        Edit narration, review content, and fix errors in real-time

  <div class="controls">
    <button class="btn-edit" id="editBtn">Studio Mode</button>
    <button class="btn-secondary" id="resetBtn">Reset</button>
    <button class="btn-export" id="exportBtn">Export PNG</button>
    <button class="btn-primary" id="playBtn">Play Demo</button>
  </div>

  <script>
    // Excalidraw-style element creation (hand-drawn look)
    class ExcalidrawRenderer {
      constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.elements = [];
        this.visibleElements = new Set();
      }

      // Helper to create rough/sketchy lines
      drawRoughLine(x1, y1, x2, y2, color = '#000000', width = 2) {
        this.ctx.strokeStyle = color;
        this.ctx.lineWidth = width;
        this.ctx.lineCap = 'round';
        this.ctx.lineJoin = 'round';

        const segments = 20;
        this.ctx.beginPath();
        this.ctx.moveTo(x1, y1);

        for (let i = 1; i <= segments; i++) {
          const t = i / segments;
          const x = x1 + (x2 - x1) * t + (Math.random() - 0.5) * 2;
          const y = y1 + (y2 - y1) * t + (Math.random() - 0.5) * 2;
          this.ctx.lineTo(x, y);
        }

        this.ctx.stroke();
      }

      // Draw rough circle (Venn diagram circles)
      drawRoughCircle(x, y, radius, color = '#667eea', fillColor = null, opacity = 0.1) {
        this.ctx.strokeStyle = color;
        this.ctx.lineWidth = 3;

        const segments = 64;
        const roughness = 3;

        this.ctx.beginPath();
        for (let i = 0; i <= segments; i++) {
          const angle = (Math.PI * 2 * i) / segments;
          const r = radius + (Math.random() - 0.5) * roughness;
          const px = x + Math.cos(angle) * r;
          const py = y + Math.sin(angle) * r;

          if (i === 0) {
            this.ctx.moveTo(px, py);
          } else {
            this.ctx.lineTo(px, py);
          }
        }
        this.ctx.closePath();

        if (fillColor) {
          this.ctx.fillStyle = fillColor;
          this.ctx.globalAlpha = opacity;
          this.ctx.fill();
          this.ctx.globalAlpha = 1;
        }

        this.ctx.stroke();
      }

      // Draw rough rectangle
      drawRoughRect(x, y, width, height, color = '#000000', fillColor = null) {
        this.ctx.strokeStyle = color;
        this.ctx.lineWidth = 2;

        this.drawRoughLine(x, y, x + width, y, color);
        this.drawRoughLine(x + width, y, x + width, y + height, color);
        this.drawRoughLine(x + width, y + height, x, y + height, color);
        this.drawRoughLine(x, y + height, x, y, color);

        if (fillColor) {
          this.ctx.fillStyle = fillColor;
          this.ctx.globalAlpha = 0.1;
          this.ctx.fillRect(x, y, width, height);
          this.ctx.globalAlpha = 1;
        }
      }

      // Draw text
      drawText(text, x, y, size = 24, color = '#1a202c', align = 'left', bold = false) {
        this.ctx.fillStyle = color;
        this.ctx.font = `${bold ? 'bold' : 'normal'} ${size}px "Comic Sans MS", cursive`;
        this.ctx.textAlign = align;
        this.ctx.textBaseline = 'middle';
        this.ctx.fillText(text, x, y);
      }

      // Draw arrow
      drawArrow(x1, y1, x2, y2, color = '#667eea') {
        this.drawRoughLine(x1, y1, x2, y2, color, 2);

        const angle = Math.atan2(y2 - y1, x2 - x1);
        const headLength = 15;

        this.ctx.fillStyle = color;
        this.ctx.beginPath();
        this.ctx.moveTo(x2, y2);
        this.ctx.lineTo(
          x2 - headLength * Math.cos(angle - Math.PI / 6),
          y2 - headLength * Math.sin(angle - Math.PI / 6)
        );
        this.ctx.lineTo(
          x2 - headLength * Math.cos(angle + Math.PI / 6),
          y2 - headLength * Math.sin(angle + Math.PI / 6)
        );
        this.ctx.closePath();
        this.ctx.fill();
      }

      clear() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
      }

      addElement(id, drawFunc) {
        this.elements.push({ id, drawFunc });
      }

      showElement(id) {
        this.visibleElements.add(id);
        this.render();
      }

      render() {
        this.clear();
        this.elements.forEach(el => {
          if (this.visibleElements.has(el.id)) {
            el.drawFunc(this);
          }
        });
      }

      reset() {
        this.visibleElements.clear();
        this.clear();
      }

      exportPNG() {
        const link = document.createElement('a');
        link.download = 'sets-diagram.png';
        link.href = this.canvas.toDataURL('image/png');
        link.click();
      }
    }

    // Initialize renderer
    const canvas = document.getElementById('canvas');
    const renderer = new ExcalidrawRenderer(canvas);

    // FIXED CONTENT - Correct mathematical representation
    function setupScene() {
      // Title
      renderer.addElement('title', (r) => {
        r.drawText('Introduction to Sets', 680, 50, 48, '#1a202c', 'center', true);
        r.drawText('Cambridge IGCSE Mathematics', 680, 95, 20, '#718096', 'center');
      });

      // Step 1: Definition
      renderer.addElement('step1-definition', (r) => {
        r.drawRoughRect(100, 150, 600, 140, '#667eea', 'rgba(102, 126, 234, 0.1)');
        r.drawText('What is a Set?', 120, 180, 26, '#667eea', 'left', true);
        r.drawText('A Set is a collection of distinct objects', 130, 220, 20, '#1a202c');
        r.drawText('or elements. We write sets using curly', 130, 250, 20, '#1a202c');
        r.drawText('braces: { }', 130, 275, 20, '#1a202c');
      });

      // Step 2: Set notation - Show BOTH sets first
      renderer.addElement('step2-notation', (r) => {
        r.drawText('Set Notation:', 100, 350, 26, '#1a202c', 'left', true);
        r.drawRoughRect(95, 380, 350, 180, '#667eea');

        r.drawText('Set A = {1, 2, 3}', 120, 420, 28, '#667eea', 'left', true);
        r.drawText('Set B = {2, 3, 4}', 120, 470, 28, '#48bb78', 'left', true);

        r.drawText('Notice: 2 and 3 appear', 120, 520, 18, '#ed8936', 'left');
        r.drawText('in BOTH sets', 150, 545, 18, '#ed8936', 'left');
      });

      // Step 3: Introduce Venn diagrams concept
      renderer.addElement('step3-venn-intro', (r) => {
        r.drawText('Venn Diagrams', 680, 180, 32, '#1a202c', 'center', true);
        r.drawText('Visual way to show sets and relationships', 680, 220, 18, '#718096', 'center');
      });

      // Step 4: Show Set A with all 3 elements
      renderer.addElement('step4-vennA', (r) => {
        r.drawRoughCircle(550, 450, 120, '#667eea', 'rgba(102, 126, 234, 0.2)', 0.15);
        r.drawText('Set A', 550, 330, 28, '#667eea', 'center', true);
        r.drawText('A = {1, 2, 3}', 550, 365, 20, '#667eea', 'center');

        // All 3 elements of A inside the circle
        r.drawText('1', 550, 420, 32, '#1a202c', 'center', true);
        r.drawText('2', 530, 470, 32, '#1a202c', 'center', true);
        r.drawText('3', 575, 470, 32, '#1a202c', 'center', true);
      });

      // Step 5: Add Set B (overlapping) with CORRECT element placement
      renderer.addElement('step5-vennB', (r) => {
        // Redraw Set A
        r.drawRoughCircle(500, 450, 120, '#667eea', 'rgba(102, 126, 234, 0.2)', 0.15);
        r.drawText('Set A', 450, 330, 24, '#667eea', 'center', true);

        // Add Set B (overlapping)
        r.drawRoughCircle(620, 450, 120, '#48bb78', 'rgba(72, 187, 120, 0.2)', 0.15);
        r.drawText('Set B', 670, 330, 24, '#48bb78', 'center', true);

        // CORRECT element placement:
        // Left region (only in A): 1
        r.drawText('1', 440, 450, 32, '#1a202c', 'center', true);

        // Overlap region (in both A and B): 2, 3
        r.drawText('2', 560, 430, 32, '#1a202c', 'center', true);
        r.drawText('3', 560, 475, 32, '#1a202c', 'center', true);

        // Right region (only in B): 4
        r.drawText('4', 680, 450, 32, '#1a202c', 'center', true);
      });

      // Step 6: Highlight intersection
      renderer.addElement('step6-intersection', (r) => {
        // Redraw the Venn diagram
        r.drawRoughCircle(500, 450, 120, '#667eea', 'rgba(102, 126, 234, 0.2)', 0.15);
        r.drawText('A', 450, 330, 28, '#667eea', 'center', true);
        r.drawRoughCircle(620, 450, 120, '#48bb78', 'rgba(72, 187, 120, 0.2)', 0.15);
        r.drawText('B', 670, 330, 28, '#48bb78', 'center', true);

        r.drawText('1', 440, 450, 32, '#1a202c', 'center', true);
        r.drawText('2', 560, 430, 32, '#ed8936', 'center', true);
        r.drawText('3', 560, 475, 32, '#ed8936', 'center', true);
        r.drawText('4', 680, 450, 32, '#1a202c', 'center', true);

        // Annotation
        r.drawArrow(560, 540, 560, 510, '#ed8936');
        r.drawText('A ∩ B = {2, 3}', 560, 570, 24, '#ed8936', 'center', true);
        r.drawText('(Intersection: elements in BOTH sets)', 560, 600, 16, '#718096', 'center');
      });

      // Step 7: Show union
      renderer.addElement('step7-union', (r) => {
        r.drawRoughCircle(500, 450, 120, '#667eea', 'rgba(102, 126, 234, 0.2)', 0.15);
        r.drawText('A', 450, 330, 28, '#667eea', 'center', true);
        r.drawRoughCircle(620, 450, 120, '#48bb78', 'rgba(72, 187, 120, 0.2)', 0.15);
        r.drawText('B', 670, 330, 28, '#48bb78', 'center', true);

        r.drawText('1', 440, 450, 32, '#1a202c', 'center', true);
        r.drawText('2', 560, 430, 32, '#1a202c', 'center', true);
        r.drawText('3', 560, 475, 32, '#1a202c', 'center', true);
        r.drawText('4', 680, 450, 32, '#1a202c', 'center', true);

        r.drawRoughRect(450, 620, 240, 50, '#667eea');
        r.drawText('A ∪ B = {1, 2, 3, 4}', 560, 645, 22, '#1a202c', 'center', true);
        r.drawText('(Union: ALL elements, no duplicates)', 560, 690, 16, '#718096', 'center');
      });

      // Step 8: Summary
      renderer.addElement('step8-summary', (r) => {
        r.drawRoughRect(100, 180, 550, 320, '#9f7aea', 'rgba(159, 122, 234, 0.05)');
        r.drawText('Set Theory Summary', 120, 220, 28, '#9f7aea', 'left', true);

        r.drawText('✓ Sets: A = {1, 2, 3}, B = {2, 3, 4}', 140, 270, 20, '#1a202c', 'left');
        r.drawText('✓ Intersection (A ∩ B): {2, 3}', 140, 310, 20, '#1a202c', 'left');
        r.drawText('   Common elements', 160, 340, 16, '#718096', 'left');

        r.drawText('✓ Union (A ∪ B): {1, 2, 3, 4}', 140, 380, 20, '#1a202c', 'left');
        r.drawText('   All elements combined', 160, 410, 16, '#718096', 'left');

        r.drawText('✓ Universal Set (ξ): All possible elements', 140, 450, 20, '#1a202c', 'left');
        r.drawText('✓ Complement (A\'): Elements NOT in A', 140, 485, 20, '#1a202c', 'left');
      });
    }

    // CORRECTED Lesson steps
    let lessonSteps = [
      {
        id: 'title',
        elements: ['title'],
        title: 'Introduction to Sets',
        description: 'Welcome to Set Theory',
        narration: "Welcome to our lesson on Introduction to Sets, a fundamental topic in Cambridge IGCSE Mathematics."
      },
      {
        id: 'step1',
        elements: ['title', 'step1-definition'],
        title: 'What is a Set?',
        description: 'Definition and notation',
        narration: "First, let's understand what a Set is. A Set is a collection of distinct objects or elements. We write sets using curly braces."
      },
      {
        id: 'step2',
        elements: ['title', 'step1-definition', 'step2-notation'],
        title: 'Set Notation',
        description: 'Defining our example sets',
        narration: "Let's look at two sets. Set A contains the numbers 1, 2, and 3. Set B contains 2, 3, and 4. Notice that the numbers 2 and 3 appear in both sets."
      },
      {
        id: 'step3',
        elements: ['title', 'step3-venn-intro'],
        title: 'Venn Diagrams',
        description: 'Visual representation of sets',
        narration: "Now we'll use Venn Diagrams, which are a visual way to show sets and their relationships."
      },
      {
        id: 'step4',
        elements: ['title', 'step3-venn-intro', 'step4-vennA'],
        title: 'Visualizing Set A',
        description: 'Set A with elements 1, 2, 3',
        narration: "Here's Set A visualized as a circle. It contains all three elements: 1, 2, and 3."
      },
      {
        id: 'step5',
        elements: ['title', 'step3-venn-intro', 'step5-vennB'],
        title: 'Adding Set B',
        description: 'Two overlapping sets',
        narration: "Now let's add Set B. The circles overlap because some elements appear in both sets. Notice how 1 is only in A, 4 is only in B, and 2 and 3 are in the overlapping region."
      },
      {
        id: 'step6',
        elements: ['title', 'step6-intersection'],
        title: 'Intersection',
        description: 'Common elements',
        narration: "The Intersection, written as A intersect B, shows the elements that appear in BOTH sets. In this case, the intersection is the set containing 2 and 3."
      },
      {
        id: 'step7',
        elements: ['title', 'step7-union'],
        title: 'Union',
        description: 'All unique elements',
        narration: "The Union, written as A union B, combines all elements from both sets without duplication. This gives us the set containing 1, 2, 3, and 4."
      },
      {
        id: 'step8',
        elements: ['title', 'step8-summary'],
        title: 'Summary',
        description: 'Key concepts review',
        narration: "Let's review. We learned about sets, set notation, and how to visualize them with Venn diagrams. We covered intersection for common elements and union for all elements combined. This completes our introduction to Set Theory!"
      }
    ];

    let currentStep = -1;
    let isPlaying = false;
    let currentAudio = null;
    let editMode = false;

    // Voice functions (same as before)
    async function fetchAudio(text, voiceId) {
      try {
        const response = await fetch('http://localhost:3001/api/voice/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, voiceId })
        });

        if (!response.ok) return null;

        const audioBlob = await response.blob();
        return new Audio(URL.createObjectURL(audioBlob));
      } catch (error) {
        console.warn('Audio fetch failed:', error);
        return null;
      }
    }

    function speak(text, onEnd) {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 0.9;
      utterance.pitch = 1;

      document.getElementById('audioIndicator').classList.add('playing');

      utterance.onend = () => {
        document.getElementById('audioIndicator').classList.remove('playing');
        if (onEnd) onEnd();
      };

      speechSynthesis.speak(utterance);
    }

    async function playNarration(text, onEnd) {
      const voiceId = 'gYWKdgLtqjPO3D5uDrDP';
      const audio = await fetchAudio(text, voiceId);

      if (audio) {
        document.getElementById('audioIndicator').classList.add('playing');

        audio.onended = () => {
          document.getElementById('audioIndicator').classList.remove('playing');
          if (onEnd) onEnd();
        };

        audio.play();
        currentAudio = audio;
      } else {
        speak(text, onEnd);
      }
    }

    function updateStepInfo(step, index) {
      document.querySelector('.step-counter').textContent = `Step ${index + 1}/${lessonSteps.length}`;
      document.getElementById('stepTitle').textContent = step.title;
      document.getElementById('stepDescription').textContent = step.description;
    }

    function updateProgress(percent) {
      document.getElementById('progressBar').style.width = percent + '%';
    }

    function playNextStep() {
      currentStep++;

      if (currentStep >= lessonSteps.length) {
        isPlaying = false;
        document.getElementById('playBtn').textContent = 'Play Demo';
        updateProgress(100);
        return;
      }

      const step = lessonSteps[currentStep];
      updateStepInfo(step, currentStep);
      updateProgress((currentStep / lessonSteps.length) * 100);

      step.elements.forEach(elementId => {
        renderer.showElement(elementId);
      });

      playNarration(step.narration, () => {
        setTimeout(() => {
          if (isPlaying) {
            playNextStep();
          }
        }, 1000);
      });
    }

    function play() {
      if (isPlaying) return;

      if (editMode) {
        alert('Exit Studio Mode first');
        return;
      }

      isPlaying = true;
      currentStep = -1;
      document.getElementById('playBtn').textContent = 'Playing...';

      playNextStep();
    }

    function reset() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
      }
      speechSynthesis.cancel();

      isPlaying = false;
      currentStep = -1;

      renderer.reset();
      updateProgress(0);
      document.getElementById('audioIndicator').classList.remove('playing');
      document.getElementById('playBtn').textContent = 'Play Demo';

      document.querySelector('.step-counter').textContent = 'Step 0/' + lessonSteps.length;
      document.getElementById('stepTitle').textContent = 'Introduction to Sets';
      document.getElementById('stepDescription').textContent = 'Click "Play Demo" to begin';
    }

    function exportImage() {
      renderer.exportPNG();
    }

    // STUDIO MODE - Edit content
    function toggleEditMode() {
      editMode = !editMode;

      const panel = document.getElementById('editorPanel');
      const stepInfo = document.getElementById('stepInfo');
      const editBtn = document.getElementById('editBtn');

      if (editMode) {
        panel.style.display = 'block';
        stepInfo.classList.add('editing-mode');
        editBtn.textContent = 'Exit Studio';
        editBtn.style.background = '#fc8181';
        renderStepEditors();
      } else {
        panel.style.display = 'none';
        stepInfo.classList.remove('editing-mode');
        editBtn.textContent = 'Studio Mode';
        editBtn.style.background = '#9f7aea';
      }
    }

    function renderStepEditors() {
      const container = document.getElementById('stepEditors');
      container.innerHTML = '';

      lessonSteps.forEach((step, index) => {
        const editor = document.createElement('div');
        editor.className = 'step-editor';
        editor.innerHTML = `
          <h3>Step ${index + 1}: ${step.id}</h3>
          <label>Title:</label>
          <input type="text" value="${step.title}" data-index="${index}" data-field="title">
          <label>Description:</label>
          <input type="text" value="${step.description}" data-index="${index}" data-field="description">
          <label>Narration:</label>
          <textarea data-index="${index}" data-field="narration">${step.narration}</textarea>
          <button class="btn-primary" onclick="previewStep(${index})">Preview</button>
        `;
        container.appendChild(editor);
      });

      // Add event listeners
      container.querySelectorAll('input, textarea').forEach(input => {
        input.addEventListener('input', (e) => {
          const index = parseInt(e.target.dataset.index);
          const field = e.target.dataset.field;
          lessonSteps[index][field] = e.target.value;
        });
      });
    }

    function previewStep(index) {
      reset();
      const step = lessonSteps[index];

      // Show all elements for this step
      step.elements.forEach(elementId => {
        renderer.showElement(elementId);
      });

      // Play narration
      playNarration(step.narration);

      // Highlight in editor
      document.querySelectorAll('.step-editor').forEach((el, i) => {
        el.classList.toggle('active', i === index);
      });
    }

    // Event listeners
    document.getElementById('playBtn').addEventListener('click', play);
    document.getElementById('resetBtn').addEventListener('click', reset);
    document.getElementById('exportBtn').addEventListener('click', exportImage);
    document.getElementById('editBtn').addEventListener('click', toggleEditMode);

    // Initialize
    setupScene();
    reset();
  </script>
</body>
</html>
